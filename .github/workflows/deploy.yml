name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape & export data
        run: python build.py --scrape --export --start 2006-01 --end $(date -d '+1 month' +%Y-%m 2>/dev/null || date -v+1m +%Y-%m)

      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bulletins.db data/bulletin_data.json
          git diff --cached --quiet || git commit -m "Update bulletin data [skip ci]"
          git push

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp -r data _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
