name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# No scheduled run: data/bulletin_data.json is the source of truth and only
# changes when a new bulletin is ingested and committed by hand (see README).
# No contents:write either — nothing is committed back to the repo any more.
permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          # SPA fallback: unknown paths (e.g. /trend) serve the app, which
          # reads location.pathname to pick the view.
          cp index.html _site/404.html
          cp og-image.png _site/
          # Only the JSON ships — the saved HTML in data/bulletins/ is build input.
          mkdir -p _site/data
          cp data/bulletin_data.json _site/data/
          echo "visa-bulletin-analyser.krutilabs.com" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
